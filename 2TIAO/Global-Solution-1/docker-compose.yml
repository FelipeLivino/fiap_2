services:
  backend-api:
    build: ./backend-api
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://astrowater:astrowater@database:5432/astrowater}
      AI_RAG_BASE_URL: ${AI_RAG_BASE_URL:-http://ai-rag-service:8001}
      AI_RAG_TIMEOUT_SECONDS: ${AI_RAG_TIMEOUT_SECONDS:-60}
    depends_on:
      database:
        condition: service_healthy
      ai-rag-service:
        condition: service_started

  frontend-dashboard:
    build: ./frontend-dashboard
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    depends_on:
      - backend-api

  ai-rag-service:
    build: ./ai-rag-service
    image: gs1-ai-rag-service
    ports:
      - "${AI_RAG_PORT:-8001}:8001"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://astrowater:astrowater@database:5432/astrowater}
    volumes:
      - ./data/rag:/app/knowledge_base:ro
      - ./data/rag:/app/data/rag:ro
      - ./data/rag_sources:/app/data/rag_sources:ro
    depends_on:
      rag-ingest:
        condition: service_completed_successfully

  rag-ingest:
    build: ./ai-rag-service
    image: gs1-ai-rag-service
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://astrowater:astrowater@database:5432/astrowater}
    volumes:
      - ./data/rag:/app/data/rag:ro
      - ./data/rag_sources:/app/data/rag_sources:ro
    command: ["python", "scripts/ingest_knowledge_base.py", "--rebuild"]
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  automation:
    build: ./automation
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_URL: http://backend-api:8000
      AUTOMATION_INTERVAL_SECONDS: ${AUTOMATION_INTERVAL_SECONDS:-60}
      ALERT_MIN_SEVERITY: ${ALERT_MIN_SEVERITY:-laranja}
      ALERT_CHANNEL: ${ALERT_CHANNEL:-console}
    command: ["python", "src/main.py", "--mode", "watch"]
    depends_on:
      backend-api:
        condition: service_started

  node-red:
    build: ./node-red
    ports:
      - "${NODE_RED_PORT:-1880}:1880"
    volumes:
      - node-red-data:/data
      - ./node-red/flows/flows.json:/data/flows.json
    depends_on:
      backend-api:
        condition: service_started

  database:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astrowater}
      POSTGRES_USER: ${POSTGRES_USER:-astrowater}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astrowater}
    volumes:
      - astrowater-db:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-astrowater} -d $${POSTGRES_DB:-astrowater}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  astrowater-db:
  node-red-data:
